name: Security Vulnerability Check

on:
  push:
    branches-ignore:
      - renovate/**
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.golangci.yaml'
      - '.github/workflows/security.yaml'
  schedule:
    - cron: '45 8 * * 5'

jobs:
  vulnerability-scan:
    permissions:
      issues: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: trim21/actions/setup-go@master

      - run: sudo apt update
      - run: sudo apt install libgpgme-dev libassuan-dev libbtrfs-dev libdevmapper-dev pkg-config -y

      - run: go run golang.org/x/vuln/cmd/govulncheck ./...

      - name: Notify failed build
        uses: jayqi/failed-build-issue-action@v1
        if: failure()
        with:
          github-token: ${{ github.token }}
          label-name: vulncheck

      - name: Close resolved vulnerability issues
        if: success()
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            const label = 'vulncheck';
            const { owner, repo } = context.repo;
            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              { owner, repo, labels: label, state: 'open', per_page: 100 }
            );
            for (const issue of issues) {
              await github.rest.issues.update({ owner, repo, issue_number: issue.number, state: 'closed' });
            }
